name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-package
          path: deploy
          if-no-files-found: error
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: staging
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-deploy-package
          path: deploy

      - name: Validate staging deploy artifact
        run: |
          test -f deploy/index.html
          test -f deploy/.htaccess
          test -f deploy/checkout/index.html
          test -f deploy/assets/payment/yape-qr.svg

      - name: Publish to staging via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR_STAGING }}
          local-dir: ./deploy/
          dangerous-clean-slate: false
