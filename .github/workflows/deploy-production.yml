name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-package
          path: deploy
          if-no-files-found: error
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: production-deploy-package
          path: deploy

      - name: Provision admin credentials into production artifact
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        run: node scripts/bootstrap-admin.mjs --target-root ./deploy

      - name: Provision MySQL runtime config into production artifact
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: utf8mb4
        run: node scripts/render-runtime-config.mjs --target-root ./deploy

      - name: Validate production deploy artifact
        run: |
          test -f deploy/index.html
          test -f deploy/.htaccess
          test -f deploy/checkout/index.html
          test -f deploy/assets/payment/yape-qr.jpeg
          test -f deploy/storage/admin/admins.json
          test -f deploy/api/_runtime-config.php

      - name: Publish to production via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR_PRODUCTION }}
          local-dir: ./deploy/
          dangerous-clean-slate: false
