<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo | Plaza San Juan Macías</title>
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="shell main-header__inner">
        <a class="brand-block" href="../">
          <strong data-brand>Plaza San Juan Macías</strong>
          <span class="muted">Catálogo general</span>
        </a>
        <form class="search-card" action="./" method="get">
          <input type="search" name="q" placeholder="Buscar en el catálogo" />
          <button class="button" type="submit">Buscar</button>
        </form>
        <nav class="header-actions">
          <a class="header-chip" href="../">Inicio</a>
          <a class="header-chip" data-account-link href="../cuenta/">
            <span data-session-chip>Mi cuenta</span>
          </a>
          <a class="header-chip" href="../checkout/">
            Carrito <span data-cart-count>0</span>
          </a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="shell page-hero__card">
          <p class="eyebrow">Catálogo</p>
          <h1>Compra por categoría o búsqueda.</h1>
          <p class="muted" data-catalog-summary></p>
        </div>
      </section>

      <section class="section">
        <div class="shell product-grid" data-catalog-grid></div>
      </section>
    </main>

    <script type="module" src="../scripts/app.js"></script>
  </body>
</html>
